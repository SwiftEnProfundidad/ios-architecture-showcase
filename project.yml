name: iOSArchitectureShowcase
options:
  minimumXcodeGenVersion: 2.44.0
  bundleIdPrefix: com.swiftenprofundidad
  developmentLanguage: en
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

packages:
  iOSArchitectureShowcaseModules:
    path: .

settings:
  base:
    DEVELOPMENT_LANGUAGE: en
    SWIFT_VERSION: "6.2"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    PRODUCT_BUNDLE_IDENTIFIER: com.swiftenprofundidad.iOSArchitectureShowcase
  configs:
    Debug:
      DEBUG_INFORMATION_FORMAT: dwarf
    Release:
      DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

configs:
  Debug: debug
  Release: release

targets:
  iOSArchitectureShowcase:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/App
    dependencies:
      - package: iOSArchitectureShowcaseModules
        product: AppComposition
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftenprofundidad.iOSArchitectureShowcase
        INFOPLIST_FILE: SupportingFiles/Info.plist
        SWIFT_EMIT_LOC_STRINGS: YES
        DEVELOPMENT_TEAM: ""

  iOSArchitectureShowcaseTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
        excludes:
          - Features/AuthTests/infrastructure/KeychainSessionStoreTestSupport.swift
          - Features/AuthTests/infrastructure/KeychainSessionStoreTests.swift
    dependencies:
      - package: iOSArchitectureShowcaseModules
        product: SharedKernel
      - package: iOSArchitectureShowcaseModules
        product: SharedNetworking
      - package: iOSArchitectureShowcaseModules
        product: SharedNavigation
      - package: iOSArchitectureShowcaseModules
        product: AuthFeature
      - package: iOSArchitectureShowcaseModules
        product: FlightsFeature
      - package: iOSArchitectureShowcaseModules
        product: BoardingPassFeature
      - package: iOSArchitectureShowcaseModules
        product: AppComposition
      - package: iOSArchitectureShowcaseModules
        product: CoverageGate
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftenprofundidad.iOSArchitectureShowcaseTests
        GENERATE_INFOPLIST_FILE: YES

  iOSArchitectureShowcaseHostedTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    hostApplication: iOSArchitectureShowcase
    sources:
      - path: Tests/TestHelpers/FixedDateHelper.swift
      - path: Tests/TestHelpers/MemoryLeakTracker.swift
      - path: Tests/Features/AuthTests/infrastructure/KeychainSessionStoreTestSupport.swift
      - path: Tests/Features/AuthTests/infrastructure/KeychainSessionStoreTests.swift
    dependencies:
      - target: iOSArchitectureShowcase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.swiftenprofundidad.iOSArchitectureShowcaseHostedTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/iOSArchitectureShowcase.app/iOSArchitectureShowcase"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  iOSArchitectureShowcase:
    build:
      targets:
        iOSArchitectureShowcase: all
    run:
      config: Debug
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      config: Debug
      targets:
        - name: iOSArchitectureShowcaseTests
          parallelizable: true
          randomExecutionOrder: true
        - name: iOSArchitectureShowcaseHostedTests
          parallelizable: false
          randomExecutionOrder: true
    profile:
      config: Release
    archive:
      config: Release
