name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Xcode version
        run: xcodebuild -version

      - name: Swift version
        run: swift --version

      - name: Install XcodeGen
        run: brew list xcodegen >/dev/null 2>&1 || brew install xcodegen

      - name: Validate repository contract
        run: ./scripts/validate.sh
